{{ define "main" }}
  <h1>{{ .Title }}</h1>

  {{ $pages := .Pages.ByDate.Reverse }}

  {{ range $pages }}
    <article style="margin-bottom: 2rem;">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <p>{{ .Date.Format "2006-01-02" }}</p>
      <p>{{ .Summary }}</p>
    </article>
  {{ end }}

{{ end }}
